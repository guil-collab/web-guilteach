<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Físico de Sonido: Gráfica Grande</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Panel de Control (Movido un poco para no estorbar la gráfica grande) */
        #ui-panel {
            position: absolute; top: 20px; right: 20px; width: 300px;
            background: rgba(20, 20, 30, 0.9); padding: 20px; border-radius: 12px;
            border: 1px solid #444; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 10; /* Asegurar que esté sobre el canvas 3D */
        }
        
        h1 { font-size: 16px; color: #4facfe; margin-top: 0; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        h2 { font-size: 12px; color: #888; margin-top: 0; font-weight: normal; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;}
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #ccc; margin-bottom: 6px; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; }
        button { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #4facfe; color: #000; }
        
        .legend { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: 5px; }
        .dot { width: 8px; height: 8px; display: inline-block; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

        /* Canvas Superpuesto para la Gráfica (IMPORTANTE: pointer-events: none para poder mover el 3D debajo) */
        #overlay-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <canvas id="overlay-canvas"></canvas>

    <div id="ui-panel">
        <h1>Visualizador Acústico</h1>
        <h2>Fusión: Campo 3D + Eje de Análisis</h2>
        
        <div class="control-group">
            <button id="btnPause">⏯ Pausar / Reanudar</button>
        </div>

        <div class="control-group">
            <label>Amplitud (Volumen / Desplazamiento)</label>
            <input type="range" id="ampSlider" min="0.1" max="1.5" step="0.1" value="0.8">
        </div>

        <div class="control-group">
            <label>Frecuencia (Tono)</label>
            <input type="range" id="freqSlider" min="0.2" max="1.5" step="0.1" value="0.5">
        </div>

        <div class="control-group" style="font-size: 11px; background: #151515; padding: 10px; border-radius: 6px; border-left: 3px solid #ffff00;">
            <strong>Guía de Observación:</strong><br>
            La gráfica inferior muestra la presión exacta del átomo amarillo.<br><br>
            <div class="legend">
                <span><span class="dot" style="background:#ff4444"></span>Compresión</span>
                <span><span class="dot" style="background:#ffff00"></span>Átomo Guía</span>
                <span><span class="dot" style="background:#4444ff"></span>Rarefacción</span>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. SETUP BÁSICO ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.FogExp2(0x050508, 0.02);

        // Cámara un poco más alejada para dar espacio a la gráfica
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2, 5, 16); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles 3D (Funcionan porque el canvas de la gráfica tiene pointer-events: none)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(2, 0, 0);
        controls.maxPolarAngle = Math.PI / 1.2; // Evitar que la cámara baje demasiado y se meta en la gráfica

        // Luces
        scene.add(new THREE.AmbientLight(0x404040));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(0, 10, 5);
        scene.add(dirLight);
        const blueLight = new THREE.PointLight(0x4444ff, 0.5, 20);
        blueLight.position.set(5, 2, 5);
        scene.add(blueLight);

        // --- 2. OBJETOS 3D ---
        const speakerGroup = new THREE.Group();
        scene.add(speakerGroup);
        const coneGeo = new THREE.ConeGeometry(3, 4, 32, 1, true);
        coneGeo.rotateZ(-Math.PI / 2);
        const cone = new THREE.Mesh(coneGeo, new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide }));
        cone.position.set(-3, 0, 0);
        speakerGroup.add(cone);
        const membrane = new THREE.Mesh(new THREE.CircleGeometry(2.8, 32).rotateY(-Math.PI/2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        membrane.position.set(-1.1, 0, 0);
        speakerGroup.add(membrane);

        // Eje Central
        const analysisTube = new THREE.Mesh(
            new THREE.CylinderGeometry(1, 1, 18, 32, 1, true).rotateZ(Math.PI/2).translate(6,0,0),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.05, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
        );
        scene.add(analysisTube);

        // Átomos
        const bgCount = 600;
        const bgMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.3 }), bgCount);
        scene.add(bgMesh);
        const bgData = []; const dummy = new THREE.Object3D();
        for(let i=0; i<bgCount; i++){
            const x = Math.random()*16 - 2; const r = 1.2 + Math.random()*4; const a = Math.random()*Math.PI*2;
            bgData.push({ x, y: Math.sin(a)*r, z: Math.cos(a)*r });
            dummy.position.set(bgData[i].x, bgData[i].y, bgData[i].z); dummy.updateMatrix(); bgMesh.setMatrixAt(i, dummy.matrix);
        }

        const mainAtoms = []; const numMain = 15; const spacing = 1.0;
        for(let i=0; i<numMain; i++){
            const atom = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.6 }));
            atom.userData = { initialX: (i * spacing) - 1.5 };
            atom.position.set(atom.userData.initialX, 0, 0);
            scene.add(atom); mainAtoms.push(atom);
        }
        const heroIndex = 7; const heroAtom = mainAtoms[heroIndex];
        heroAtom.material = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x333300, roughness: 0.2 });
        heroAtom.scale.set(1.3, 1.3, 1.3);

        // --- 3. VARIABLES Y UI ---
        const params = { amp: 0.8, freq: 0.5, speed: 3.0, paused: false };
        let time = 0;
        document.getElementById('ampSlider').addEventListener('input', (e) => params.amp = parseFloat(e.target.value));
        document.getElementById('freqSlider').addEventListener('input', (e) => params.freq = parseFloat(e.target.value));
        document.getElementById('btnPause').addEventListener('click', () => params.paused = !params.paused);

        // --- 4. CANVAS OVERLAY (GRÁFICA GIGANTE) ---
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        function resizeCanvas() { overlayCanvas.width = window.innerWidth; overlayCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function toScreenPosition(obj, camera) {
            const vector = new THREE.Vector3().copy(obj.position).project(camera);
            return { x: (vector.x * .5 + .5) * overlayCanvas.width, y: (-(vector.y * .5) + .5) * overlayCanvas.height };
        }

        // --- 5. ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (!params.paused) time += 0.015;
            const phaseGlobal = time * params.speed * params.freq;

            // Física 3D
            membrane.position.x = -1.1 + (Math.sin(phaseGlobal) * params.amp * 0.3);
            mainAtoms.forEach((atom, i) => {
                const localPhase = phaseGlobal - (atom.userData.initialX * 0.4);
                atom.position.x = atom.userData.initialX + (Math.sin(localPhase) * params.amp);
                const pressure = Math.cos(localPhase);
                if(i !== heroIndex) {
                    if (pressure > 0.2) atom.material.color.setHSL(0.0, 0.8, 0.5);
                    else if (pressure < -0.2) atom.material.color.setHSL(0.6, 0.8, 0.5);
                    else atom.material.color.setHex(0x888888);
                }
            });
            const colorBg = new THREE.Color();
            for(let i=0; i<bgCount; i++){
                const base = bgData[i]; const localPhase = phaseGlobal - (base.x * 0.4);
                dummy.position.set(base.x + (Math.sin(localPhase) * params.amp), base.y, base.z);
                dummy.updateMatrix(); bgMesh.setMatrixAt(i, dummy.matrix);
                const p = Math.cos(localPhase);
                if(p > 0.3) colorBg.setHex(0x552222); else if(p < -0.3) colorBg.setHex(0x222255); else colorBg.setHex(0x333333);
                bgMesh.setColorAt(i, colorBg);
            }
            bgMesh.instanceMatrix.needsUpdate = true; bgMesh.instanceColor.needsUpdate = true;


            // --- DIBUJAR GRÁFICA GRANDE ---
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            // Definir dimensiones relativas al tamaño de pantalla
            const graphW = overlayCanvas.width * 0.7; // 70% del ancho de pantalla
            const graphH = overlayCanvas.height * 0.3; // 30% de la altura
            const padBottom = 50;
            const gX = (overlayCanvas.width - graphW) / 2;
            const gY = overlayCanvas.height - graphH/2 - padBottom; // gY es el centro vertical de la gráfica

            // Fondo de la gráfica (Panel oscuro)
            ctx.fillStyle = 'rgba(15, 15, 25, 0.9)';
            const bgPad = 30;
            ctx.beginPath();
            ctx.roundRect(gX - bgPad, gY - graphH/2 - bgPad, graphW + bgPad*2, graphH + bgPad*1.5, 12);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.stroke();

            // Título y Etiquetas (Más grandes)
            ctx.font = 'bold 16px Segoe UI'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
            ctx.fillText("GRÁFICA DE PRESIÓN EN EL ÁTOMO GUÍA", overlayCanvas.width/2, gY - graphH/2 - 10);
            
            ctx.font = 'bold 14px Segoe UI'; ctx.textAlign = 'right';
            ctx.fillStyle = '#ff5555'; ctx.fillText("+ COMPRESIÓN", gX - 10, gY - graphH/4);
            ctx.fillStyle = '#4444ff'; ctx.fillText("- RAREFACCIÓN", gX - 10, gY + graphH/4);
            ctx.textAlign = 'left'; ctx.fillStyle = '#888';
            ctx.fillText("TIEMPO ➔", gX + graphW + 10, gY + 5);

            // Eje Central
            ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(gX, gY); ctx.lineTo(gX + graphW, gY); ctx.stroke();

            // Curva de Presión (Más gruesa y escalada)
            ctx.beginPath(); ctx.lineWidth = 4; // Línea gruesa
            let heroGraphPos = {x:0, y:0};
            const heroDelay = heroAtom.userData.initialX * 0.4; 
            const heroPhase = phaseGlobal - heroDelay;
            
            // Escala vertical para que llene la nueva altura
            const scaleY = graphH * 0.4; 

            for(let i=0; i<=graphW; i+=2) { // i+=2 para optimizar dibujo en pantallas grandes
                // Ajustar la escala horizontal de tiempo según el ancho
                const relX = (i - graphW/2) * (10 / graphW * params.freq * 2); 
                const val = Math.cos(heroPhase - relX) * params.amp;
                
                const py = gY - (val * scaleY);
                const px = gX + i;
                
                if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);

                // Color dinámico
                const normalizedP = val / params.amp;
                const r = normalizedP > 0 ? 255 : 50;
                const b = normalizedP < 0 ? 255 : 50;
                ctx.strokeStyle = `rgb(${r}, 50, ${b})`;
                ctx.stroke(); ctx.beginPath(); ctx.moveTo(px, py);

                if(Math.abs(i - graphW/2) < 2) heroGraphPos = {x: px, y: py};
            }

            // Línea Conectora
            const heroScreen = toScreenPosition(heroAtom, camera);
            if(heroScreen.x > 0 && heroScreen.x < overlayCanvas.width && heroScreen.y > 0 && heroScreen.y < overlayCanvas.height) {
                ctx.beginPath(); ctx.fillStyle = '#ffff00';
                ctx.arc(heroGraphPos.x, heroGraphPos.y, 8, 0, Math.PI*2); ctx.fill(); // Punto más grande
                ctx.beginPath(); ctx.setLineDash([6, 6]);
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.6)'; ctx.lineWidth = 3; // Línea conectora más gruesa
                ctx.moveTo(heroGraphPos.x, heroGraphPos.y);
                ctx.lineTo(heroScreen.x, heroScreen.y);
                ctx.stroke(); ctx.setLineDash([]);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
